<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>장바구니 | Agent-Commerce OS</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/common.css" />
  <link rel="stylesheet" href="./assets/css/cart.css" />
</head>

<body>
  <div id="header"></div>

  <main>
    <section class="cart-hero">
      <div class="container">
        <span class="cart-eyebrow">Shopping Cart</span>
        <h1>장바구니</h1>
        <p>선택한 상품을 확인하고 주문서로 이동합니다.</p>
      </div>
    </section>

    <section class="cart-section">
      <div class="container cart-layout">
        <div class="cart-list-card">
          <div class="cart-list-header">
            <label>
              <input type="checkbox" id="selectAllCheckbox" checked />
              전체 선택
            </label>

            <button type="button" id="deleteSelectedBtn">
              선택 삭제
            </button>
          </div>

          <div class="cart-list" id="cartList">
            <!-- cart.js 렌더링 -->
          </div>

          <div class="cart-empty" id="cartEmpty">
            <strong>장바구니가 비어 있습니다.</strong>
            <p>상품을 담은 후 다시 확인해주세요.</p>
            <a href="./index.html" class="btn-primary">상품 보러가기</a>
          </div>
        </div>

        <aside class="cart-summary-card">
          <h2>결제 예정 금액</h2>

          <div class="summary-row">
            <span>상품금액</span>
            <strong id="summaryProductPrice">0원</strong>
          </div>

          <div class="summary-row">
            <span>배송비</span>
            <strong id="summaryShippingFee">0원</strong>
          </div>

          <div class="summary-total">
            <span>총 결제금액</span>
            <strong id="summaryTotalPrice">0원</strong>
          </div>

          <button type="button" class="checkout-btn" id="checkoutBtn">
            주문하기
          </button>

          <p class="cart-api-note">
            추후 <code>GET /api/cart</code>, <code>PATCH /api/cart/{id}</code>와 연결됩니다.
          </p>
        </aside>
      </div>
    </section>
  </main>

  <div id="chatbotWidgetArea"></div>
  <div id="footer"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./assets/js/mock-products.js"></script>
  <script src="./assets/js/chatbot-widget.js"></script>
  <script src="./assets/js/common.js"></script>
  <script src="./assets/js/cart.js"></script>
</body>
</html>
