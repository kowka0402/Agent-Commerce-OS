<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>상품 목록 | Agent-Commerce OS</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/common.css" />
  <link rel="stylesheet" href="./assets/css/category.css" />
</head>

<body>
  <div id="header"></div>

  <main>
    <section class="category-hero">
      <div class="container">
        <div class="category-hero-text">
          <span class="category-eyebrow" id="categoryEyebrow">
            Product Search
          </span>

          <h1 id="categoryTitle">
            전체 상품
          </h1>

          <p id="categoryDescription">
            Agent-Commerce OS에 등록된 상품을 카테고리와 검색 조건에 따라 확인합니다.
          </p>
        </div>
      </div>
    </section>

    <section class="category-page-section">
      <div class="container category-layout">
        <!-- Sidebar Filter -->
        <aside class="category-sidebar">
          <div class="filter-card">
            <h2>필터</h2>

            <div class="filter-group">
              <strong>카테고리</strong>

              <label>
                <input type="radio" name="categoryFilter" value="all" checked />
                전체
              </label>

              <label>
                <input type="radio" name="categoryFilter" value="small_appliance" />
                소형가전
              </label>

              <label>
                <input type="radio" name="categoryFilter" value="fresh_food" />
                신선식품
              </label>
            </div>

            <div class="filter-group">
              <strong>가격대</strong>

              <label>
                <input type="radio" name="priceFilter" value="all" checked />
                전체
              </label>

              <label>
                <input type="radio" name="priceFilter" value="under30000" />
                3만원 이하
              </label>

              <label>
                <input type="radio" name="priceFilter" value="30000to80000" />
                3만원 ~ 8만원
              </label>

              <label>
                <input type="radio" name="priceFilter" value="over80000" />
                8만원 이상
              </label>
            </div>

            <button type="button" class="filter-reset-btn" id="resetFilterBtn">
              필터 초기화
            </button>
          </div>
        </aside>

        <!-- Product Area -->
        <section class="category-content">
          <div class="category-toolbar">
            <div>
              <strong id="resultCount">0개 상품</strong>
              <p id="resultKeywordText">전체 상품을 표시합니다.</p>
            </div>

            <select id="sortSelect">
              <option value="recommended">추천순</option>
              <option value="priceLow">낮은 가격순</option>
              <option value="priceHigh">높은 가격순</option>
              <option value="name">상품명순</option>
            </select>
          </div>

          <div class="category-product-grid" id="categoryProductGrid">
            <!-- category.js에서 렌더링 -->
          </div>

          <div class="category-empty" id="categoryEmpty">
            <strong>검색 결과가 없습니다.</strong>
            <p>검색어 또는 필터 조건을 변경해보세요.</p>
            <a href="./index.html" class="btn-primary">메인으로 돌아가기</a>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="chatbotWidgetArea"></div>
  <div class="cart-confirm-dim" id="cartConfirmDim"></div>

  <div class="cart-confirm-modal" id="cartConfirmModal">
    <strong>상품이 장바구니에 담겼습니다.</strong>
    <p id="cartConfirmProductName">상품명</p>
  
    <div class="cart-confirm-actions">
      <button type="button" id="continueShoppingBtn">
        쇼핑 계속하기
      </button>
  
      <a href="./cart.html">
        장바구니 이동
      </a>
    </div>
  </div>
  <div id="footer"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./assets/js/mock-products.js"></script>
  <script src="./assets/js/chatbot-widget.js"></script>
  <script src="./assets/js/common.js"></script>
  <script src="./assets/js/category.js"></script>
</body>
</html>
