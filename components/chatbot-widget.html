<div class="chatbot-widget" id="chatbotWidget">
    <div class="chatbot-header">
      <div>
        <strong>AI 쇼퍼</strong>
        <p>상품 추천 · 스펙 비교</p>
      </div>
  
      <button type="button" id="closeChatbotBtn">×</button>
    </div>
  
    <div class="chatbot-body" id="chatbotBody">
      <div class="chat-message bot">
        안녕하세요. 원하는 상품 조건을 알려주세요.
      </div>
    </div>
  
    <form class="chatbot-input-area" id="chatbotForm">
      <input
        type="text"
        id="chatbotInput"
        placeholder="예: 전기세 적은 제습기 추천해줘"
        autocomplete="off"
      />
  
      <button type="submit">전송</button>
    </form>
  </div>
  
  <button type="button" class="floating-chat" id="openChatbotBtn">
    AI 쇼퍼
  </button>
