<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>로그인 | Agent-Commerce OS</title>

  <link rel="stylesheet" href="./assets/css/reset.css" />
  <link rel="stylesheet" href="./assets/css/common.css" />
  <link rel="stylesheet" href="./assets/css/login.css" />
</head>

<body>
  <div id="header"></div>

  <main class="login-main">
    <section class="login-section">
      <div class="login-card">
        <span class="login-eyebrow">Account Login</span>

        <h1>로그인</h1>

        <p>
          일반 사용자는 쇼핑몰 이용 페이지로, 관리자 계정은 관리자 대시보드로 이동합니다.
        </p>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="loginEmail">이메일</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="example@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">비밀번호</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="비밀번호 입력"
              required
            />
          </div>

          <button type="submit" id="loginSubmitBtn">
            로그인
          </button>

          <div class="login-sub-actions">
            <span>아직 회원이 아니신가요?</span>
            <a href="./signup.html">회원가입</a>
          </div>
        </form>

        <div class="login-note">
          <strong>관리자 판별 방식</strong>
          <p>
            로그인한 이메일이 Supabase의 <code>admin_users</code> 테이블에 있으면
            관리자 권한으로 처리됩니다.
          </p>
        </div>
      </div>
    </section>
  </main>

  <div id="chatbotWidgetArea"></div>
  <div id="footer"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./assets/js/supabase-config.js"></script>
  <script src="./assets/js/auth-api.js"></script>
  <script src="./assets/js/chatbot-widget.js"></script>
  <script src="./assets/js/common.js"></script>
</body>
</html>
